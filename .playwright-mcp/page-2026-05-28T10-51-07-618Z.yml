- main [ref=e2]:
  - generic [ref=e3]: Yükleniyor...
  - main "Ana içerik" [ref=e4]:
    - main [ref=e5]:
      - heading "Pet Oteli Seçerken Nelere Dikkat Edilmeli?" [level=1] [ref=e6]
      - paragraph [ref=e7]: Evcil hayvanınızı bırakmadan önce temizlik, iletişim, kabul koşulları ve acil durum süreçlerini nasıl kontrol edeceğinizi öğrenin.
      - img "Pet Oteli Seçerken Nelere Dikkat Edilmeli? görseli" [ref=e9]
      - generic [ref=e10]:
        - heading "Kısa cevap" [level=2] [ref=e11]
        - paragraph [ref=e12]: Pet oteli seçerken en doğru yaklaşım işletmeyi yalnızca fiyatla değil; kabul koşulları, günlük bakım rutini, temizlik, iletişim hızı, acil durum hazırlığı ve evcil hayvanınızın özel ihtiyaçlarına verdiği yanıtla değerlendirmektir. Petkonak bu süreci şehir, ilçe ve kategori bazlı kısa listeye dönüştürür; son teyit işletmeyle yapılır.
        - list [ref=e13]:
          - listitem [ref=e14]: Önce hayvan türü, sağlık durumu, bakım ihtiyacı ve tarih aralığı netleştirilmelidir.
          - listitem [ref=e15]: İşletmeyle aynı soru listesi üzerinden görüşmek daha sağlıklı karşılaştırma sağlar.
          - listitem [ref=e16]: Fiyat, müsaitlik, kabul ve teslim koşulları Petkonak'ta değil, işletmenin güncel yanıtında kesinleşir.
      - generic [ref=e17]:
        - generic [ref=e18]:
          - heading "İlk kontrol listesi" [level=2] [ref=e19]
          - paragraph [ref=e20]: İşletmenin kabul ettiği hayvan türleri, iletişim kanalları, çalışma saatleri, konum ve fotoğraflarını birlikte inceleyin. Kedi ve köpek için aynı kriterleri kullanmak yanıltıcı olabilir; kedi için oda ve sakinlik, köpek için hareket alanı ve gezdirme rutini öne çıkar.
          - list [ref=e21]:
            - listitem [ref=e22]: İşletme kedi, köpek veya her ikisini kabul ediyor mu?
            - listitem [ref=e23]: Konaklama mı, gündüz bakım mı, ek hizmet mi sunuluyor?
            - listitem [ref=e24]: Konum, teslim-alış saati ve ulaşım sizin planınıza uyuyor mu?
        - generic [ref=e25]:
          - heading "İletişimde netlik" [level=2] [ref=e26]
          - paragraph [ref=e27]: Fiyat, müsaitlik, mama düzeni ve özel ihtiyaçları yazılı olarak netleştirmek sonradan yaşanabilecek karışıklıkları azaltır. İlk mesajda tarih, hayvan türü, yaş, aşı durumu, mama/ilaç bilgisi ve varsa davranış notlarını paylaşmak işletmenin hızlı yanıt vermesini sağlar.
          - list [ref=e28]:
            - listitem [ref=e29]: Güncel fiyat ve tarih uygunluğu.
            - listitem [ref=e30]: Mama, ilaç, transfer ve özel bakımın fiyata dahil olup olmadığı.
            - listitem [ref=e31]: Acil durumda haber verme ve veteriner yönlendirmesi.
        - generic [ref=e32]:
          - heading "Yorumları nasıl okumalı?" [level=2] [ref=e33]
          - paragraph [ref=e34]: "Tekil yorumlardan çok tekrar eden temalara bakın: temizlik, personel ilgisi, iletişim hızı, teslim alma süreci ve hayvanın dönüşteki hali karar için daha anlamlıdır. Aşırı iddialı yorumlar yerine farklı kullanıcıların aynı konuda tutarlı deneyim anlatması daha güçlü sinyaldir."
          - list [ref=e35]:
            - listitem [ref=e36]: Temizlik ve koku hakkında tekrar eden yorumlar.
            - listitem [ref=e37]: Personelin iletişim hızı ve bilgilendirme düzeni.
            - listitem [ref=e38]: Teslim-alış sürecinde yaşanan olumlu veya olumsuz tekrarlar.
        - generic [ref=e39]:
          - heading "Petkonak nasıl yardımcı olur?" [level=2] [ref=e40]
          - paragraph [ref=e41]: Petkonak, işletme bilgilerini şehir, ilçe ve kategoriye göre okunabilir hale getirir. Profildeki bilgileri karar öncesi kontrol edin; fiyat, müsaitlik ve kabul şartlarını işletmeyle doğrudan teyit edin. Petkonak'ın rolü seçenekleri görünür kılmak ve doğrudan iletişimi kolaylaştırmaktır.
          - list [ref=e42]:
            - listitem [ref=e43]: Şehir ve kategori sayfalarıyla kısa liste oluşturun.
            - listitem [ref=e44]: Profildeki telefon, WhatsApp veya web sitesi bağlantısını kullanın.
            - listitem [ref=e45]: Güncel koşulları işletmenin yanıtıyla doğrulayın.
