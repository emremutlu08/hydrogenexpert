          - paragraph [ref=e38]: Decision Guide
          - 'heading "Shopify Hydrogen vs Next.js: which headless stack fits your store?" [level=1] [ref=e39]'
          - generic [ref=e40]:
            - generic [ref=e41]: By Emre Mutlu
            - time [ref=e42]: Published May 27, 2026
            - time [ref=e43]: Updated May 27, 2026
          - generic [ref=e44]:
            - paragraph [ref=e45]: Hydrogen vs Next.js is rarely a pure framework debate. For a merchant, the real decision is how much Shopify-native commerce, hosting simplicity, custom application flexibility, and long-term maintenance ownership the storefront needs.
            - paragraph [ref=e46]: Hydrogen is usually the cleaner first choice when Shopify is the center of the business and the project is mostly commerce. Next.js can still be the better answer when the storefront is part of a wider product, content, membership, or multi-platform application.
          - generic [ref=e47]:
            - generic [ref=e48]:
              - heading "The decision is not only performance" [level=2] [ref=e49]
              - paragraph [ref=e50]: A well-built Hydrogen storefront and a well-built Next.js storefront can both be fast. The bigger differences are default commerce wiring, hosting model, team familiarity, and how much custom infrastructure the merchant wants to own after launch.
            - generic [ref=e51]:
              - heading "Choose Hydrogen when Shopify is the system of record" [level=2] [ref=e52]
              - list [ref=e53]:
                - listitem [ref=e54]: Product, collection, cart, checkout, customer, and content decisions mostly live in Shopify.
                - listitem [ref=e55]: Oxygen hosting and Shopify-aligned deployment reduce infrastructure decisions.
                - listitem [ref=e56]: The team wants fewer custom commerce primitives to maintain.
                - listitem [ref=e57]: The first launch should stay close to Shopify's roadmap instead of a broad composable platform.
            - generic [ref=e58]:
              - heading "Choose Next.js when the storefront is also a web app" [level=2] [ref=e59]
              - list [ref=e60]:
                - listitem [ref=e61]: The site needs major non-commerce routes such as portals, booking, editorial workflows, or app-like account areas.
                - listitem [ref=e62]: The in-house team already has strong Next.js and Vercel patterns.
                - listitem [ref=e63]: The business wants platform-neutral hosting or a broader composable stack.
                - listitem [ref=e64]: The team accepts more upfront wiring for cart, API caching, checkout handoff, and app integrations.
            - generic [ref=e65]:
              - heading "Where TCO usually hides" [level=2] [ref=e66]
              - list [ref=e67]:
                - listitem [ref=e68]: CMS and page-building workflow.
                - listitem [ref=e69]: Search, filters, recommendations, and merchandising.
                - listitem [ref=e70]: Reviews, subscriptions, loyalty, analytics, and consent.
                - listitem [ref=e71]: Preview, launch, monitoring, and post-launch developer availability.
            - generic [ref=e72]:
              - heading "A safer decision path" [level=2] [ref=e73]
              - list [ref=e74]:
                - listitem [ref=e75]: Confirm whether Liquid can still solve the business problem.
                - listitem [ref=e76]: Map required app behavior before choosing a framework.
                - listitem [ref=e77]: Choose Hydrogen for Shopify-native commerce scope, Next.js for broader application scope.
                - listitem [ref=e78]: Price the maintenance model, not only the first build.
