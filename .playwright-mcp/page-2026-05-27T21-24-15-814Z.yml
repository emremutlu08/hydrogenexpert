              - paragraph [ref=e57]:
                - strong [ref=e58]: Doğru Pet Oteli Nasıl Seçilir? Kedi ve Köpekler İçin Kontrol Listesi
                - text: rehberi, karar vermeden önce aynı bilgileri sakin ve karşılaştırılabilir şekilde toplamanıza yardımcı olur. Doğru pet oteli; hayvanın türüne, sağlık geçmişine, günlük rutinine ve stres eşiğine uygun bakım planı sunabilen işletmedir. Karar yalnızca fiyatla değil, alan düzeni, aşı kontrolü, gözetim, beslenme takibi, acil durumda aranacak kişi ve size verilecek güncelleme sıklığıyla birlikte verilmelidir.
              - heading "Kısa cevap" [level=2] [ref=e59]
              - paragraph [ref=e60]: Doğru pet oteli; hayvanın türüne, sağlık geçmişine, günlük rutinine ve stres eşiğine uygun bakım planı sunabilen işletmedir. Karar yalnızca fiyatla değil, alan düzeni, aşı kontrolü, gözetim, beslenme takibi, acil durumda aranacak kişi ve size verilecek güncelleme sıklığıyla birlikte verilmelidir.
              - heading "Karar vermeden önce kontrol edin" [level=2] [ref=e61]
              - list [ref=e62]:
                - listitem [ref=e63]: Kedi ve köpek alanları ayrılıyor mu, kalabalık ve gürültü nasıl yönetiliyor?
                - listitem [ref=e64]: Aşı kartı, ilaç, alerji ve özel beslenme bilgileri yazılı alınıyor mu?
                - listitem [ref=e65]: Günlük yemek, su, tuvalet ve oyun takibi nasıl tutuluyor?
                - listitem [ref=e66]: Acil durumda hangi veteriner veya kişiyle iletişime geçiliyor?
                - listitem [ref=e67]: Fotoğraf, video veya kısa durum notu hangi sıklıkla paylaşılıyor?
              - heading "Kısa kayıt yöntemi" [level=2] [ref=e68]
              - paragraph [ref=e69]: Bu konuyu işletmeyle konuşurken tek tek hatırlamaya çalışmak yerine kısa bir not formatı kullanın. Tarih, görüştüğünüz işletme, verilen cevap, ek ücret, özel şart ve tekrar teyit edilmesi gereken konuları aynı yerde tutarsanız birkaç seçenek arasında daha sakin karşılaştırma yaparsınız.
              - list [ref=e70]:
                - listitem [ref=e71]: Cevabı sözlü aldıysanız aynı gün kısa mesaj veya e-posta ile teyit isteyin.
                - listitem [ref=e72]: Hayvanınızın rutiniyle ilgili özel bir madde varsa bunu fiyat konuşmasından önce belirtin.
                - listitem [ref=e73]: Kararı yalnızca yakınlık veya fiyatla değil, bakım sürecinin açıklığıyla birlikte verin.
              - heading "İşletmeyle konuşurken sorulacak sorular" [level=2] [ref=e74]
              - list [ref=e75]:
                - listitem [ref=e76]: Kabul öncesi deneme ziyareti veya kısa tanışma yapılabiliyor mu?
                - listitem [ref=e77]: Ek ücret doğuran hizmetler hangileri ve bunlar yazılı paylaşılıyor mu?
                - listitem [ref=e78]: Kediler için saklanma alanı, köpekler için kontrollü hareket planı var mı?
              - heading "Dikkat edilmesi gereken işaretler" [level=2] [ref=e79]
              - list [ref=e80]:
                - listitem [ref=e81]: Aşı, ilaç veya acil iletişim bilgisi sorulmuyorsa.
                - listitem [ref=e82]: Aynı cevap her hayvan için kullanılıyor ve özel ihtiyaç notu alınmıyorsa.
                - listitem [ref=e83]: Günlük rutin veya gözetim saatleri belirsiz kalıyorsa.
              - heading "Karşılaştırmayı nasıl yapmalısınız?" [level=2] [ref=e84]
              - paragraph [ref=e85]: En sağlıklı karşılaştırma, her işletmeye aynı soruları sormakla başlar. Bir işletme hızlı cevap veriyor ama bakım ayrıntılarını netleştirmiyorsa, başka bir işletme daha uzak olsa bile daha güvenilir bir karar zemini sunabilir. Tersine, çok ayrıntılı görünen bir hizmet açıklaması da güncel fiyat, müsaitlik ve kabul şartı teyidi yapılmadan yeterli sayılmaz.
              - paragraph [ref=e86]: "Kendi karar tablonuzda beş alanı yan yana tutun: sağlık ve aşı kontrolü, günlük rutin, iletişim sıklığı, acil durum süreci ve toplam maliyet. Bu beş alan açıkça cevaplanmıyorsa kararınızı ertelemek veya ikinci bir seçenekle görüşmek daha güvenlidir."
              - heading "Petkonak'ta bu bilgiyi nasıl kullanabilirsiniz?" [level=2] [ref=e87]
              - paragraph [ref=e88]: Petkonak'ta önce şehir ve kategori filtresiyle kısa liste oluşturun; sonra her işletmeyle doğrudan konuşup bu kontrol listesini yazılı cevaplarla netleştirin. Petkonak rezervasyon veya ödeme platformu değildir, karar öncesi karşılaştırma rehberidir.
