          - paragraph [ref=e38]: CMS
          - heading "Shopify Hydrogen CMS and visual builder decision guide" [level=1] [ref=e39]
          - generic [ref=e40]:
            - generic [ref=e41]: By Emre Mutlu
            - time [ref=e42]: Published May 27, 2026
            - time [ref=e43]: Updated May 27, 2026
          - generic [ref=e44]:
            - paragraph [ref=e45]: Hydrogen does not remove the content workflow question. It makes that question more important because every section, landing page, product story, and campaign module needs a clear owner.
            - paragraph [ref=e46]: The safest CMS choice depends on who edits the storefront, how often layout changes, whether content is Shopify-centric, and how much custom engineering the merchant can maintain.
          - generic [ref=e47]:
            - generic [ref=e48]:
              - heading "Metaobjects are best for structured Shopify-native content" [level=2] [ref=e49]
              - paragraph [ref=e50]: "Metaobjects work well when content is strongly tied to Shopify data: product callouts, reusable sections, brand facts, collection copy, and controlled landing blocks. They are not a complete visual builder by themselves."
            - generic [ref=e51]:
              - heading "Sanity fits complex editorial content" [level=2] [ref=e52]
              - list [ref=e53]:
                - listitem [ref=e54]: Use Sanity when content spans campaigns, guides, lookbooks, editorial workflows, approvals, and non-Shopify channels.
                - listitem [ref=e55]: Budget for schema design, preview wiring, content modeling, and frontend query maintenance.
                - listitem [ref=e56]: Do not add Sanity just because the site is headless; add it when the editorial workflow needs it.
            - generic [ref=e57]:
              - heading "Builder, Pack, and Weaverse solve page control differently" [level=2] [ref=e58]
              - list [ref=e59]:
                - listitem [ref=e60]: Visual builders help when marketers need layout control without waiting for developers.
                - listitem [ref=e61]: They still need component boundaries, data rules, QA, and performance discipline.
                - listitem [ref=e62]: Treat them as workflow products, not magic replacements for storefront architecture.
            - generic [ref=e63]:
              - heading "Custom components fit stable sections" [level=2] [ref=e64]
              - paragraph [ref=e65]: If the store only needs a small set of repeatable sections, custom Hydrogen components with Shopify-managed data may be cheaper and easier to maintain than a full visual editing layer.
            - generic [ref=e66]:
              - heading "The practical decision table" [level=2] [ref=e67]
              - list [ref=e68]:
                - listitem [ref=e69]: "Mostly Shopify data and controlled fields: Metaobjects plus custom components."
                - listitem [ref=e70]: "Heavy editorial program: Sanity or another headless CMS."
                - listitem [ref=e71]: "Frequent landing page layout changes: Pack, Weaverse, Builder, or a similar visual builder."
                - listitem [ref=e72]: "Small fixed-scope launch: keep the content model narrow first."
          - generic [ref=e73]:
            - generic [ref=e74]:
              - paragraph [ref=e75]: Next paths
              - heading "Where this guide connects across HydrogenExpert." [level=2] [ref=e76]
            - paragraph [ref=e77]: Pick the content system around editor behavior, not around the most impressive demo. A smaller model that the merchant can actually maintain usually wins.
